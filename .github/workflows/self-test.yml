name: Self Test — AI Review
on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ops-platform
        uses: actions/checkout@v4

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/pr.diff || true
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

      - name: Run light review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat review/prompts/code-quality.md > /tmp/combined-prompt.md
          echo -e "\n---\n" >> /tmp/combined-prompt.md
          cat review/prompts/security.md >> /tmp/combined-prompt.md

          bash review/scripts/run-review-pass.sh \
            "combined" \
            "claude-sonnet-4-6-20250514" \
            /tmp/combined-prompt.md \
            /tmp/pr.diff \
            "" \
            > /tmp/review-comment.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bash review/scripts/post-review-comment.sh \
            "$REPO" \
            "$PR_NUMBER" \
            "$(cat /tmp/review-comment.md)"
